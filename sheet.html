<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile Bottom Sheet</title>
    <style>
        :root {
            --header-height: 60px;
            --panel-min: 80px;
            --panel-mid: 62vh;
            --panel-max: calc(100vh - var(--header-height) - 20px);
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f0f0f0;
            overflow: hidden; /* Verhindert Scrollen der Seite selbst */
        }

        header {
            height: var(--header-height);
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        /* Das verschiebbare Panel */
        #sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100vh;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 20;
            transform: translateY(calc(100% - var(--panel-min)));
            transition: transform 0.3s ease-out;
            touch-action: none; /* Wichtig für die Gesten-Steuerung */
        }

        /* Der Griff zum Ziehen */
        .handle {
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        .handle::after {
            content: "";
            width: 40px;
            height: 5px;
            background: #ccc;
            border-radius: 10px;
        }

        .content {
            padding: 20px;
            overflow-y: auto;
            height: calc(100% - 40px);
        }
    </style>
</head>
<body>

<header>Header Bereich</header>

<div id="sheet">
    <div class="handle" id="handle"></div>
    <div class="content">
        <h3>Mein Panel</h3>
        <p>Wische am grauen Balken nach oben!</p>
        <p>1. Stufe: 62%</p>
        <p>2. Stufe: Bis unter den Header</p>
    </div>
</div>

<script>
    const sheet = document.getElementById('sheet');
    const handle = document.getElementById('handle');
    
    let startY, startTransform;
    const minTranslate = window.innerHeight - 80; // 80px sichtbar
    const midTranslate = window.innerHeight * 0.38; // 62% Höhe (also 38% von oben)
    const maxTranslate = 80; // Knapp unter Header

    handle.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        const style = window.getComputedStyle(sheet);
        const matrix = new WebKitCSSMatrix(style.transform);
        startTransform = matrix.m42;
        sheet.style.transition = 'none'; // Sofortige Reaktion beim Ziehen
    });

    handle.addEventListener('touchmove', (e) => {
        const deltaY = e.touches[0].clientY - startY;
        let newTranslate = startTransform + deltaY;
        
        // Grenzen einhalten
        if (newTranslate < maxTranslate) newTranslate = maxTranslate;
        if (newTranslate > minTranslate) newTranslate = minTranslate;
        
        sheet.style.transform = `translateY(${newTranslate}px)`;
    });

    handle.addEventListener('touchend', (e) => {
        sheet.style.transition = 'transform 0.3s ease-out';
        const currentTranslate = new WebKitCSSMatrix(window.getComputedStyle(sheet).transform).m42;

        // Einrast-Logik
        if (currentTranslate < (midTranslate + maxTranslate) / 2) {
            sheet.style.transform = `translateY(${maxTranslate}px)`;
        } else if (currentTranslate < (minTranslate + midTranslate) / 2) {
            sheet.style.transform = `translateY(${midTranslate}px)`;
        } else {
            sheet.style.transform = `translateY(${minTranslate}px)`;
        }
    });
</script>

</body>
</html>
