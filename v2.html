<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CycleQuest 3D – Voxel Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold:#ffd700; --cyan:#00fbff; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#0a0a14; color:white; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
        #voxel-canvas { position:absolute; inset:0; z-index:0; display:block; touch-action:none; }

        #ui-overlay { position:absolute; top:15px; left:15px; right:15px; z-index:10; pointer-events:none; }
        .stats-card {
            background:rgba(0,0,0,0.78); backdrop-filter:blur(14px);
            border:1px solid rgba(255,215,0,0.28); border-radius:18px;
            padding:14px 18px; pointer-events:auto;
            display:flex; justify-content:space-between; align-items:center;
            box-shadow:0 4px 24px rgba(0,0,0,.6);
        }
        .coin-ctr  { font-size:2rem; color:var(--gold); font-weight:900; line-height:1; }
        .lvl-badge { background:var(--gold); color:#000; padding:3px 10px; border-radius:8px; font-size:.78rem; font-weight:800; margin-left:8px; }
        #status-text { font-size:.68rem; color:#888; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; }

        /* camera hint */
        #cam-hint {
            position:absolute; bottom:170px; right:15px; z-index:10;
            background:rgba(0,0,0,0.6); border-radius:12px; padding:8px 12px;
            font-size:.65rem; color:#888; letter-spacing:1px; line-height:1.7;
            pointer-events:none;
        }

        #controls {
            position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
            display:flex; gap:12px; z-index:10; pointer-events:auto; white-space:nowrap;
        }
        .btn {
            border:none; padding:18px 34px; border-radius:50px;
            font-weight:900; font-size:1.2rem; cursor:pointer;
            text-transform:uppercase; letter-spacing:1px; transition:all .15s;
        }
        .btn:active { transform:scale(0.90); }
        .btn:disabled { background:#333!important; color:#666!important; cursor:not-allowed; box-shadow:none!important; }
        #quest-btn { background:var(--gold); color:#000; box-shadow:0 4px 22px rgba(255,215,0,.35); }
        #nav-btn   { background:transparent; color:var(--cyan); border:2px solid var(--cyan); }
        #nav-btn.active { background:var(--cyan); color:#000; }

        #difficulty-bar {
            position:absolute; bottom:116px; left:50%; transform:translateX(-50%);
            width:min(340px,90vw); z-index:10;
            background:rgba(0,0,0,0.78); backdrop-filter:blur(14px);
            border:1px solid rgba(255,215,0,.22); border-radius:18px;
            padding:12px 18px 10px;
        }
        #diff-labels { display:flex; justify-content:space-between; font-size:.68rem; font-weight:700; margin-bottom:9px; color:#777; }
        #diff-labels span.active { color:var(--gold); transform:scale(1.1); display:inline-block; }
        #diff-slider {
            -webkit-appearance:none; width:100%; height:5px; border-radius:3px; outline:none; cursor:pointer;
            background:linear-gradient(90deg,#3ddc84 0 25%,#ffd700 25% 50%,#ff8c00 50% 75%,#ff3b3b 75% 100%);
        }
        #diff-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
            background:#fff; border:2.5px solid var(--gold); box-shadow:0 0 8px rgba(255,215,0,.7);
        }
        #diff-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:#fff; border:2.5px solid var(--gold); cursor:pointer; }
        #diff-km { text-align:center; font-size:.7rem; color:#666; margin-top:6px; letter-spacing:1px; }

        #loading {
            position:fixed; inset:0; background:rgba(0,0,0,.93); display:none;
            flex-direction:column; align-items:center; justify-content:center; z-index:999;
        }
        .spinner { width:52px; height:52px; border:4px solid #1a1a1a; border-top-color:var(--gold); border-radius:50%; animation:spin .9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading-msg { margin-top:16px; letter-spacing:2px; font-weight:700; color:#aaa; font-size:.82rem; text-align:center; max-width:85%; }
    </style>
</head>
<body>
<canvas id="voxel-canvas"></canvas>

<div id="loading"><div class="spinner"></div><p id="loading-msg">⛏ BAUE VOXEL-WELT...</p></div>

<div id="ui-overlay">
    <div class="stats-card">
        <div>
            <div id="status-text">GPS SUCHEN...</div>
            <div style="display:flex;align-items:center">
                <span id="lvl-disp" style="font-size:1.1rem;font-weight:800">LEVEL 1</span>
                <span class="lvl-badge" id="diff-tag">-- km</span>
            </div>
            <div class="coin-ctr">🪙 <span id="coins-coll">0</span><small style="font-size:.88rem;color:#666"> / <span id="coins-total">10</span></small></div>
        </div>
        <div style="text-align:right;line-height:2">
            <div style="font-size:.64rem;color:var(--cyan);letter-spacing:1px">⛏ VOXEL WORLD</div>
            <div id="dist-val" style="font-weight:700;color:var(--gold);font-size:.92rem">Quest bereit</div>
            <div id="nav-status" style="font-size:.64rem;color:#444;letter-spacing:1px">NAVIGATION AUS</div>
        </div>
    </div>
</div>

<div id="cam-hint">🖱 Ziehen = drehen<br>🤏 Pinch / Scrollen = zoom</div>

<div id="difficulty-bar">
    <div id="diff-labels">
        <span>🟢 Easy</span><span>🟡 Medium</span><span>🟠 Hard</span><span>🔴 Ultra</span>
    </div>
    <input type="range" id="diff-slider" min="0" max="3" step="1" value="0">
    <div id="diff-km">~6 km</div>
</div>

<div id="controls">
    <button id="quest-btn" class="btn">🗺 QUEST</button>
    <button id="nav-btn"   class="btn" disabled>▶ START</button>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const MT_KEY = '0h9bkxDZifPxKncVxFXv';
const ZOOM   = 11;    // ~51 m/pixel at lat 48° → 96×51 ≈ 4.9 km
const GRID   = 96;
const VGAP   = 0.86;
const HMULT  = 0.048;

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const S = {
    level:1, coinsToCollect:10,
    // Routes 60% shorter: 6 / 12 / 18 / 24 km
    baseDist:6,
    collected:0, userPos:null,
    navigating:false, routeReady:false,
    terrainCenter:null, routeCoords:null, coinPositions:[],
};

/* ═══════════════════════════════════════════════════
   THREE.JS
═══════════════════════════════════════════════════ */
const canvas   = document.getElementById('voxel-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ab8d4);
scene.fog = new THREE.Fog(0x7ab8d4, 58, 148);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 400);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.72));
const sun = new THREE.DirectionalLight(0xfff0d0, 0.80);
sun.position.set(-30, 70, 20);
scene.add(sun);
const skyLight = new THREE.DirectionalLight(0xd0eeff, 0.20);
skyLight.position.set(0, 50, 0);
scene.add(skyLight);

// Shared geos / mats
const TERRAIN_GEO = new THREE.BoxGeometry(VGAP,1,VGAP);
const TERRAIN_MAT = new THREE.MeshLambertMaterial({ vertexColors:true });
const ROUTE_GEO   = new THREE.BoxGeometry(VGAP*1.1,0.45,VGAP*1.1);
const ROUTE_MAT   = new THREE.MeshLambertMaterial({ color:0x00fbff, emissive:0x003344, emissiveIntensity:0.65 });
const COIN_GEO    = new THREE.BoxGeometry(0.6,0.6,0.6);
const COIN_MAT    = new THREE.MeshLambertMaterial({ color:0xffd700, emissive:0x553300, emissiveIntensity:0.7 });

let terrainInst=null, routeInst=null, coin3D=[], playerMesh=null;
let elevGrid=null, colorGrid=null, minElev=0, gridPixX=0, gridPixY=0;

/* ═══════════════════════════════════════════════════
   CAMERA ORBIT CONTROLS
   Drag  → rotate (theta / phi)
   Scroll / pinch → zoom (radius)
═══════════════════════════════════════════════════ */
const cam = { theta:0.4, phi:1.0, radius:68, target:new THREE.Vector3(0,6,0) };

function applyCam() {
    const sp=Math.sin(cam.phi), cp=Math.cos(cam.phi);
    camera.position.set(
        cam.target.x + cam.radius * sp * Math.sin(cam.theta),
        cam.target.y + cam.radius * cp,
        cam.target.z + cam.radius * sp * Math.cos(cam.theta)
    );
    camera.lookAt(cam.target);
}
applyCam();

// Pointer drag
let drag={ on:false, x:0, y:0 };
canvas.addEventListener('pointerdown', e=>{
    drag.on=true; drag.x=e.clientX; drag.y=e.clientY;
    canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
    if (!drag.on) return;
    cam.theta -= (e.clientX-drag.x)*0.007;
    cam.phi   = Math.max(0.15, Math.min(1.45, cam.phi+(e.clientY-drag.y)*0.005));
    drag.x=e.clientX; drag.y=e.clientY;
});
canvas.addEventListener('pointerup',   ()=>drag.on=false);
canvas.addEventListener('pointerleave',()=>drag.on=false);

// Scroll zoom
canvas.addEventListener('wheel', e=>{
    cam.radius = Math.max(10, Math.min(130, cam.radius+e.deltaY*0.04));
    e.preventDefault();
}, {passive:false});

// Pinch zoom
let pinch0=0;
canvas.addEventListener('touchstart', e=>{
    if (e.touches.length===2) {
        const [a,b]=e.touches;
        pinch0=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    }
},{passive:true});
canvas.addEventListener('touchmove', e=>{
    if (e.touches.length===2) {
        const [a,b]=e.touches;
        const d=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
        cam.radius=Math.max(10, Math.min(130, cam.radius-(d-pinch0)*0.14));
        pinch0=d;
        e.preventDefault();
    }
},{passive:false});

/* ═══════════════════════════════════════════════════
   COORDINATE MATH
═══════════════════════════════════════════════════ */
const lonToTX   = (lon,z)=>(lon+180)/360*(1<<z);
const latToTY   = (lat,z)=>{ const s=Math.sin(lat*Math.PI/180); return (1-Math.log((1+s)/(1-s))/(2*Math.PI))/2*(1<<z); };
const rgbToElev = (r,g,b)=>-10000+(r*65536+g*256+b)*0.1;

function setGrid(lat,lon){ gridPixX=lonToTX(lon,ZOOM)*256; gridPixY=latToTY(lat,ZOOM)*256; }
function geoToGrid(lat,lon){ return { i:Math.round(lonToTX(lon,ZOOM)*256-gridPixX+GRID/2), j:Math.round(latToTY(lat,ZOOM)*256-gridPixY+GRID/2) }; }

function gridToWorld(i,j){
    const ii=Math.max(0,Math.min(GRID-1,i)), jj=Math.max(0,Math.min(GRID-1,j));
    const h=Math.max(1,Math.round(((elevGrid?elevGrid[jj*GRID+ii]:300)-minElev)*HMULT+1));
    return { x:i-GRID/2, y:h, z:j-GRID/2 };
}

function getDist(lo1,la1,lo2,la2){
    const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ═══════════════════════════════════════════════════
   SATELLITE → BLOCK COLOUR
═══════════════════════════════════════════════════ */
function toBlock(r,g,b,elev){
    if (elev<3)  return 0x1565C0;
    if (elev<8)  return 0x1E88E5;
    if ((elev-minElev)>650) return 0xECEFF1;
    const bri=(r+g+b)/765, gDom=g>r+10&&g>b+6, bDom=b>r+22&&b>g+12, grey=Math.abs(r-g)<22&&Math.abs(g-b)<22&&Math.abs(r-b)<22;
    if (bDom)                          return 0x1976D2;
    if (grey&&bri>0.62)                return 0xBDBDBD;
    if (grey&&bri>0.28&&bri<0.62)     return 0x757575;
    if (gDom&&g<75)                    return 0x1B5E20;
    if (gDom&&g<115)                   return 0x2E7D32;
    if (gDom&&g<155)                   return 0x388E3C;
    if (gDom)                          return 0x7CB342;
    if (r>140&&g>115&&b<r-30)         return 0xF9A825;
    if (bri>0.78)                      return 0xD7CCC8;
    if (bri<0.15)                      return 0x4E342E;
    return ((Math.round(r/85)*85)<<16)|((Math.round(g/85)*85)<<8)|(Math.round(b/85)*85);
}
function elevColor(e){
    if (e<3)   return 0x1565C0; if (e<8)   return 0x1976D2;
    if (e<200) return 0x7CB342; if (e<400) return 0x388E3C;
    if (e<600) return 0x6D4C41; if (e<900) return 0x9E9E9E;
    return 0xECEFF1;
}

/* ═══════════════════════════════════════════════════
   TILE LOADING
═══════════════════════════════════════════════════ */
function fetchTile(url){ return new Promise(res=>{ const img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=c.height=256; c.getContext('2d').drawImage(img,0,0); res(c.getContext('2d').getImageData(0,0,256,256).data); }catch(e){res(null);} }; img.onerror=()=>res(null); img.src=url; }); }
const elevUrl=(tx,ty)=>`https://api.maptiler.com/tiles/terrain-rgb-v2/${ZOOM}/${tx}/${ty}.png?key=${MT_KEY}`;
const satUrl =(tx,ty)=>`https://api.maptiler.com/tiles/satellite-v2/${ZOOM}/${tx}/${ty}.jpg?key=${MT_KEY}`;

/* ═══════════════════════════════════════════════════
   LOAD TERRAIN
═══════════════════════════════════════════════════ */
async function loadTerrain(lat,lon){
    document.getElementById('loading-msg').innerText='⛏ LADE ECHTE LANDSCHAFT...';
    document.getElementById('loading').style.display='flex';
    S.terrainCenter=[lat,lon]; setGrid(lat,lon);
    const half=GRID/2;

    const needed=new Map();
    for(let j=0;j<GRID;j++)for(let i=0;i<GRID;i++){
        const px=gridPixX+(i-half),py=gridPixY+(j-half);
        const tx=Math.floor(px/256),ty=Math.floor(py/256);
        needed.set(`${tx}_${ty}`,{tx,ty});
    }
    document.getElementById('loading-msg').innerText=`⛏ LADE ${needed.size} KACHELN...`;
    const eT=new Map(),sT=new Map();
    await Promise.all([...needed.entries()].flatMap(([key,{tx,ty}])=>[
        fetchTile(elevUrl(tx,ty)).then(d=>eT.set(key,d)),
        fetchTile(satUrl (tx,ty)).then(d=>sT.set(key,d)),
    ]));

    elevGrid=new Float32Array(GRID*GRID); colorGrid=new Uint32Array(GRID*GRID);
    for(let j=0;j<GRID;j++)for(let i=0;i<GRID;i++){
        const px=gridPixX+(i-half),py=gridPixY+(j-half);
        const tx=Math.floor(px/256),ty=Math.floor(py/256);
        const px_=Math.floor(px)-tx*256, py_=Math.floor(py)-ty*256;
        const pi=(py_*256+px_)*4, key=`${tx}_${ty}`;
        const ed=eT.get(key);
        const elev=ed?rgbToElev(ed[pi],ed[pi+1],ed[pi+2]):350+Math.sin(i*.22)*90+Math.cos(j*.18)*70+Math.sin((i+j)*.38)*35;
        elevGrid[j*GRID+i]=elev;
        const sd=sT.get(key);
        colorGrid[j*GRID+i]=sd?toBlock(sd[pi],sd[pi+1],sd[pi+2],elev):elevColor(elev);
    }
    minElev=Infinity; for(let k=0;k<GRID*GRID;k++) if(elevGrid[k]<minElev) minElev=elevGrid[k];

    buildTerrain();
    document.getElementById('loading').style.display='none';
}

/* ═══════════════════════════════════════════════════
   BUILD TERRAIN
═══════════════════════════════════════════════════ */
function buildTerrain(){
    if(terrainInst) scene.remove(terrainInst);
    terrainInst=new THREE.InstancedMesh(TERRAIN_GEO,TERRAIN_MAT,GRID*GRID);
    const d=new THREE.Object3D(),c=new THREE.Color();
    for(let j=0;j<GRID;j++)for(let i=0;i<GRID;i++){
        const k=j*GRID+i, elev=elevGrid[k];
        const h=Math.max(1,Math.round((elev-minElev)*HMULT+1));
        d.position.set(i-GRID/2,h/2,j-GRID/2); d.scale.set(1,h,1); d.updateMatrix();
        terrainInst.setMatrixAt(k,d.matrix); terrainInst.setColorAt(k,c.setHex(colorGrid[k]));
    }
    terrainInst.instanceMatrix.needsUpdate=true; terrainInst.instanceColor.needsUpdate=true;
    scene.add(terrainInst);
    buildRoute(); buildCoins3D(); updatePlayer3D(); spawnNPCs();
}

/* ═══════════════════════════════════════════════════
   ROUTE
═══════════════════════════════════════════════════ */
function buildRoute(){
    if(routeInst) scene.remove(routeInst);
    if(!S.routeCoords) return;
    const step=Math.max(1,Math.floor(S.routeCoords.length/600)), cells=new Set();
    for(let k=0;k<S.routeCoords.length;k+=step){
        const [lon,lat]=S.routeCoords[k], g=geoToGrid(lat,lon);
        if(g.i>=0&&g.i<GRID&&g.j>=0&&g.j<GRID) cells.add(`${g.i},${g.j}`);
    }
    const arr=[...cells].map(s=>s.split(',').map(Number)); if(!arr.length) return;
    routeInst=new THREE.InstancedMesh(ROUTE_GEO,ROUTE_MAT,arr.length);
    const d=new THREE.Object3D();
    arr.forEach(([i,j],idx)=>{ const wp=gridToWorld(i,j); d.position.set(wp.x,wp.y+0.24,wp.z); d.scale.set(1,1,1); d.updateMatrix(); routeInst.setMatrixAt(idx,d.matrix); });
    routeInst.instanceMatrix.needsUpdate=true; scene.add(routeInst);
}

/* ═══════════════════════════════════════════════════
   COINS
═══════════════════════════════════════════════════ */
function buildCoins3D(){
    coin3D.forEach(m=>scene.remove(m)); coin3D=[];
    S.coinPositions.forEach(c=>{
        if(c.collected) return;
        const g=geoToGrid(c.pos[1],c.pos[0]); if(g.i<0||g.i>=GRID||g.j<0||g.j>=GRID) return;
        const wp=gridToWorld(g.i,g.j);
        const mesh=new THREE.Mesh(COIN_GEO,COIN_MAT);
        mesh.position.set(wp.x,wp.y+2,wp.z); mesh.userData.baseY=wp.y+2;
        scene.add(mesh); coin3D.push(mesh); c.mesh=mesh;
    });
}

/* ═══════════════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════════════ */
function updatePlayer3D(){
    if(!S.userPos) return;
    const [lon,lat]=S.userPos, g=geoToGrid(lat,lon), wp=gridToWorld(g.i,g.j);
    if(!playerMesh){
        // Red cylinder with a tiny white head
        const pg=new THREE.Group();
        pg.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.95,8), new THREE.MeshLambertMaterial({color:0xff2222,emissive:0x330000,emissiveIntensity:.5})),{position:new THREE.Vector3(0,.0,0)}));
        pg.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.42,.42,.42), new THREE.MeshLambertMaterial({color:0xFFD5B5})),{position:new THREE.Vector3(0,.72,0)}));
        playerMesh=pg; scene.add(playerMesh);
    }
    playerMesh.position.set(wp.x,wp.y+.48,wp.z);
}

/* ═══════════════════════════════════════════════════
   MINECRAFT-STYLE NPC CHARACTERS
═══════════════════════════════════════════════════ */
const NPC_PALETTES = [
    { skin:0xFFD5B5, shirt:0x1565C0, pants:0x0D47A1, hair:0x4E342E, name:'Steve'  },
    { skin:0xFFCBA4, shirt:0xC62828, pants:0x4E342E, hair:0xFF8F00, name:'Alex'   },
    { skin:0xFFE0B2, shirt:0x2E7D32, pants:0x1B5E20, hair:0xFFB300, name:'Robin'  },
    { skin:0xF5CBA7, shirt:0x6A1B9A, pants:0x4A148C, hair:0x212121, name:'Mira'   },
    { skin:0xFFD5B5, shirt:0xE65100, pants:0x5D4037, hair:0x795548, name:'Kai'    },
    { skin:0xFFE0B2, shirt:0x37474F, pants:0x263238, hair:0x212121, name:'Sam'    },
    { skin:0xFFCBA4, shirt:0xF9A825, pants:0x5D4037, hair:0x3E2723, name:'Lily'   },
    { skin:0xFFD5B5, shirt:0x00695C, pants:0x004D40, hair:0x5D4037, name:'Chris'  },
];

class NPC {
    constructor(gi, gj, palette) {
        this.gi = gi; this.gj = gj;
        this.walkDir = Math.random()*Math.PI*2;
        // 30% stand still, 70% walk
        this.speed = Math.random()>0.3 ? 0.35+Math.random()*0.25 : 0;
        this.dirTimer = 1+Math.random()*4;
        this.group = this._build(palette);
    }

    _build(p) {
        const g=new THREE.Group();
        const box=(w,h,d,col,x,y,z)=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col}));
            m.position.set(x,y,z); return m;
        };
        // Head
        g.add(box(.44,.44,.44, p.skin,  0,1.12,0));
        // Hair / hat brim
        g.add(box(.48,.14,.48, p.hair,  0,1.40,0));
        // Body
        g.add(box(.38,.52,.22, p.shirt, 0,.62,0));
        // Eyes
        g.add(box(.09,.07,.03, 0x111122,-.10,1.15,.23));
        g.add(box(.09,.07,.03, 0x111122, .10,1.15,.23));

        // Arms as pivot groups (shoulder point)
        this.lAP=new THREE.Group(); this.lAP.position.set(-.30,.88,0);
        this.lAP.add(box(.19,.52,.19, p.shirt, 0,-.26,0)); g.add(this.lAP);
        this.rAP=new THREE.Group(); this.rAP.position.set( .30,.88,0);
        this.rAP.add(box(.19,.52,.19, p.shirt, 0,-.26,0)); g.add(this.rAP);

        // Legs as pivot groups (hip point)
        this.lLP=new THREE.Group(); this.lLP.position.set(-.11,.36,0);
        this.lLP.add(box(.19,.54,.19, p.pants, 0,-.27,0)); g.add(this.lLP);
        this.rLP=new THREE.Group(); this.rLP.position.set( .11,.36,0);
        this.rLP.add(box(.19,.54,.19, p.pants, 0,-.27,0)); g.add(this.rLP);

        return g;
    }

    update(t, dt) {
        const walking = this.speed > 0;
        const sw = walking ? Math.sin(t*3.5) * 0.52 : 0;

        // Limb animation
        this.lLP.rotation.x =  sw;
        this.rLP.rotation.x = -sw;
        this.lAP.rotation.x = -sw*0.65;
        this.rAP.rotation.x =  sw*0.65;

        if (walking) {
            this.gi += Math.cos(this.walkDir)*this.speed*dt;
            this.gj += Math.sin(this.walkDir)*this.speed*dt;
            // Bounce at edges
            const m=5;
            if (this.gi<m||this.gi>GRID-m) { this.walkDir=Math.PI-this.walkDir; this.gi=Math.max(m,Math.min(GRID-m,this.gi)); }
            if (this.gj<m||this.gj>GRID-m) { this.walkDir=-this.walkDir;         this.gj=Math.max(m,Math.min(GRID-m,this.gj)); }
        }

        // Random direction change
        this.dirTimer-=dt;
        if (this.dirTimer<=0) {
            this.walkDir+=(Math.random()-.5)*Math.PI*1.4;
            this.dirTimer=2+Math.random()*5;
        }

        // Snap to terrain surface
        const wp=gridToWorld(Math.round(this.gi),Math.round(this.gj));
        this.group.position.set(wp.x, wp.y, wp.z);
        this.group.rotation.y = this.walkDir - Math.PI*.5;
    }
}

let npcs = [];

function spawnNPCs(){
    npcs.forEach(n=>scene.remove(n.group)); npcs=[];
    if (!elevGrid) return;

    // Collect land cells (not water)
    const land=[];
    for(let j=8;j<GRID-8;j++) for(let i=8;i<GRID-8;i++)
        if(elevGrid[j*GRID+i]>10) land.push({i,j});
    if(!land.length) return;

    for(let n=0;n<10;n++){
        const cell=land[Math.floor(Math.random()*land.length)];
        const pal=NPC_PALETTES[n%NPC_PALETTES.length];
        const npc=new NPC(cell.i+(Math.random()-.5), cell.j+(Math.random()-.5), pal);
        scene.add(npc.group);
        npcs.push(npc);
    }
}

/* ═══════════════════════════════════════════════════
   ANIMATION LOOP
═══════════════════════════════════════════════════ */
let lastT=0;
const _navTarget=new THREE.Vector3(0,6,0);

function animate(ms){
    requestAnimationFrame(animate);
    const t=ms*.001, dt=Math.min(t-lastT,.1); lastT=t;

    // Coins
    coin3D.forEach((m,k)=>{ m.rotation.y=t*1.9+k*1.1; m.rotation.x=Math.sin(t*.9+k)*.25; m.position.y=m.userData.baseY+Math.sin(t*1.8+k*.85)*.3; });
    if(routeInst) routeInst.material.emissiveIntensity=0.4+Math.sin(t*1.3)*.22;

    // NPCs
    npcs.forEach(n=>n.update(t,dt));

    // Camera
    if(S.navigating&&playerMesh){
        _navTarget.lerp(playerMesh.position,.05);
        cam.target.lerp(_navTarget,.05);
        cam.radius+=(26-cam.radius)*.04;
        cam.phi   +=(0.88-cam.phi)*.04;
        applyCam();
    } else {
        applyCam();
    }

    renderer.render(scene,camera);
}
animate(0);

function onGPS(pos){
    const{longitude:lon,latitude:lat}=pos.coords;
    const first=!S.userPos; S.userPos=[lon,lat];
    document.getElementById('status-text').innerText='GPS AKTIV ✓';
    if(first&&!S.routeReady) loadTerrain(lat,lon);
    else if(S.terrainCenter&&!S.routeReady&&getDist(lat,lon,...S.terrainCenter)>0.4) loadTerrain(lat,lon);
    updatePlayer3D(); checkCoinCollection(lon,lat);
}

/* ═══════════════════════════════════════════════════
   BROUTER
═══════════════════════════════════════════════════ */
async function timedFetch(url,ms=9000){
    const c=new AbortController(), t=setTimeout(()=>c.abort(),ms);
    try{ const r=await fetch(url,{signal:c.signal}); clearTimeout(t); return r; }
    catch(e){ clearTimeout(t); throw e; }
}
async function fetchBRouter(lonlats){
    const base=`https://brouter.de/brouter?lonlats=${lonlats}&profile=trekking&alternativeidx=0&format=geojson`;
    const msg=document.getElementById('loading-msg');
    for(const s of [
        {l:'ROUTE BERECHNEN...', go:()=>timedFetch(base,10000),parse:r=>r.json()},
        {l:'PROXY 1...', go:()=>timedFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`,11000), parse:async r=>{const j=await r.json();return JSON.parse(j.contents);}},
        {l:'PROXY 2...', go:()=>timedFetch(`https://corsproxy.io/?url=${encodeURIComponent(base)}`,9000),parse:r=>r.json()},
    ]){
        try{ msg.innerText=s.l; const res=await s.go(); if(!res.ok) continue; const d=await s.parse(res); if(d?.features) return d; }
        catch(e){ console.warn(s.l,e.message); }
    }
    return null;
}

/* ═══════════════════════════════════════════════════
   QUEST — routes 60% shorter
   baseDist: 6/12/18/24 km (was 15/30/45/60)
   Uses 4 waypoints instead of 6 for tighter loops
═══════════════════════════════════════════════════ */
async function generateRoute(){
    if(!S.userPos){alert('Warte auf GPS-Signal...'); return;}
    document.getElementById('loading').style.display='flex';
    document.getElementById('loading-msg').innerText='ROUTE BERECHNEN...';
    document.getElementById('quest-btn').disabled=true;

    const[lon,lat]=S.userPos;
    // 60% shorter: radius is proportionally smaller
    const km=S.baseDist*Math.pow(1.01,S.level-1);
    const rDeg=(km/(2*Math.PI))/111.32;
    const pts=[`${lon},${lat}`];
    const a0=Math.random()*Math.PI*2;
    // 4 waypoints (not 6) → tighter, shorter actual route
    const NW=4;
    for(let i=0;i<NW;i++){
        const a=a0+i*(2*Math.PI/NW);
        pts.push(`${(lon+Math.cos(a)*(rDeg/Math.cos(lat*Math.PI/180))).toFixed(6)},${(lat+Math.sin(a)*rDeg).toFixed(6)}`);
    }
    pts.push(`${lon},${lat}`);

    const geo=await fetchBRouter(pts.join('|'));
    if(geo){
        S.routeCoords=geo.features[0].geometry.coordinates;
        document.getElementById('diff-tag').innerText=`${(geo.features[0].properties['track-length']/1000).toFixed(1)} km`;
        S.collected=0; S.coinsToCollect=10+Math.floor((S.level-1)/10); updateUI();
        const cStep=Math.floor(S.routeCoords.length/(S.coinsToCollect+1));
        S.coinPositions=Array.from({length:S.coinsToCollect},(_,i)=>({collected:false,pos:S.routeCoords[Math.min((i+1)*cStep,S.routeCoords.length-1)],mesh:null}));
        await loadTerrain(lat,lon);
        S.routeReady=true; document.getElementById('nav-btn').disabled=false;
    } else {
        alert('Routing nicht erreichbar.\nBitte WLAN prüfen und erneut versuchen.');
        document.getElementById('loading').style.display='none';
    }
    document.getElementById('quest-btn').disabled=false;
}

/* ═══════════════════════════════════════════════════
   NAV / COINS / EFFECTS / UI
═══════════════════════════════════════════════════ */
function toggleNav(){
    S.navigating=!S.navigating;
    const btn=document.getElementById('nav-btn'),ns=document.getElementById('nav-status');
    if(S.navigating){ btn.classList.add('active'); btn.textContent='⏸ PAUSE'; ns.innerText='▶ NAVIGATION AN'; ns.style.color='var(--cyan)'; }
    else             { btn.classList.remove('active'); btn.textContent='▶ START'; ns.innerText='NAVIGATION AUS'; ns.style.color='#444'; }
}

function checkCoinCollection(lon,lat){
    S.coinPositions.forEach(c=>{
        if(c.collected||getDist(lon,lat,c.pos[0],c.pos[1])>=0.05) return;
        c.collected=true; if(c.mesh){scene.remove(c.mesh);coin3D=coin3D.filter(m=>m!==c.mesh);}
        S.collected++; goldBurst(); updateUI();
        if(S.collected>=S.coinsToCollect){
            setTimeout(()=>{ grandFinale(); setTimeout(()=>{ alert(`🏆 LEVEL ${S.level} COMPLETE!`); S.level++; generateRoute(); },900); },300);
        }
    });
}

function goldBurst(){
    const go=(ox,oa)=>confetti({particleCount:55,spread:52,startVelocity:26,angle:oa,origin:{x:ox,y:0.62},colors:['#ffd700','#ffaa00','#fff176','#ffffff','#ff8c00'],gravity:1.2});
    go(0.5,90); setTimeout(()=>{go(0.46,82);go(0.54,98);},110);
}
function grandFinale(){
    const end=Date.now()+1700;
    (function f(){ confetti({particleCount:9,angle:58,spread:55,origin:{x:0},colors:['#ffd700','#fff176','#ffaa00']}); confetti({particleCount:9,angle:122,spread:55,origin:{x:1},colors:['#ffd700','#fff176','#ffaa00']}); if(Date.now()<end) requestAnimationFrame(f); })();
}

function updateUI(){
    document.getElementById('coins-coll').innerText=S.collected;
    document.getElementById('coins-total').innerText=S.coinsToCollect;
    document.getElementById('lvl-disp').innerText=`LEVEL ${S.level}`;
}

const DIFFS=[{km:6},{km:12},{km:18},{km:24}];
function applyDiff(idx){ S.baseDist=DIFFS[idx].km; document.getElementById('diff-km').innerText=`~${DIFFS[idx].km} km`; document.querySelectorAll('#diff-labels span').forEach((el,i)=>el.classList.toggle('active',i===idx)); }
document.getElementById('diff-slider').addEventListener('input',e=>applyDiff(+e.target.value));
applyDiff(0);
document.getElementById('quest-btn').addEventListener('click',generateRoute);
document.getElementById('nav-btn').addEventListener('click',toggleNav);
</script>
