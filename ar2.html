<!DOCTYPE html>
<html>
<head>
    <title>AR 3D Gelände-Planer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 999; background: rgba(0,0,0,0.5); padding: 10px; color: white; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui-layer">
        <label>Höhen-Verstärkung:</label><br>
        <input type="range" id="heightSlider" min="1" max="5" step="0.1" value="1">
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="mapContainer" scale="1 1 1">
            <a-box position="0 0.5 0" color="green"></a-box>
        </a-entity>

        <a-marker-camera preset="hiro"></a-marker-camera>
    </a-scene>

    <script>
        const slider = document.getElementById('heightSlider');
        const map = document.getElementById('mapContainer');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            map.setAttribute('scale', `1 ${val} 1`);
        });

        // Logik für Wegpunkte per Klick/Geste
        document.querySelector('a-scene').addEventListener('click', function (evt) {
            // Hier würde die Raycaster-Logik die Position auf dem 3D-Modell berechnen
            console.log("Wegpunkt gesetzt an:", evt.detail.intersection.point);
        });
    </script>
</body>
</html>
