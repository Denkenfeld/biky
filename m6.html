<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CycleQuest 3D</title>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold:#ffd700; --gold2:#ffaa00; --gold3:#fff176; --bg:#0d0d0d; --cyan:#00fbff; }
        * { box-sizing:border-box; }
        body { margin:0; padding:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:white; overflow:hidden; }
        #map { position:absolute; inset:0; }

        #ui-overlay {
            position:absolute; top:15px; left:15px; right:15px;
            display:flex; flex-direction:column; gap:10px; pointer-events:none;
        }
        .stats-card {
            background:rgba(13,13,13,0.88); backdrop-filter:blur(20px);
            padding:16px 20px; border-radius:22px;
            border:1px solid rgba(255,215,0,0.35);
            pointer-events:auto; display:flex; justify-content:space-between; align-items:center;
            box-shadow:0 8px 32px rgba(0,0,0,0.55);
        }
        .coin-counter { font-size:2.1rem; color:var(--gold); font-weight:900; line-height:1; }
        .level-badge { background:var(--gold); color:#000; padding:4px 11px; border-radius:10px; font-size:0.82rem; font-weight:800; margin-left:9px; vertical-align:middle; }
        #status-text { font-size:0.72rem; color:#888; letter-spacing:1.5px; margin-bottom:3px; text-transform:uppercase; }

        #controls {
            position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
            display:flex; gap:12px; pointer-events:auto; white-space:nowrap;
        }
        .btn {
            border:none; padding:20px 38px;
            border-radius:50px; font-weight:900; font-size:1.25rem;
            transition:all 0.18s ease; cursor:pointer; text-transform:uppercase; letter-spacing:1px;
        }
        .btn:active { transform:scale(0.91); }
        .btn:disabled { background:#333!important; color:#666!important; cursor:not-allowed; box-shadow:none!important; }
        #quest-btn { background:var(--gold); color:#000; box-shadow:0 5px 28px rgba(255,215,0,0.35); }
        #nav-btn   { background:transparent; color:var(--cyan); border:2px solid var(--cyan); box-shadow:0 5px 28px rgba(0,251,255,0.18); }
        #nav-btn.active { background:var(--cyan); color:#000; box-shadow:0 5px 28px rgba(0,251,255,0.45); }

        #loading {
            position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none;
            flex-direction:column; align-items:center; justify-content:center; z-index:9999;
        }
        .spinner { width:56px; height:56px; border:5px solid #1a1a1a; border-top-color:var(--gold); border-radius:50%; animation:spin 0.9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading-msg { margin-top:18px; letter-spacing:2.5px; font-weight:700; color:#ccc; font-size:0.85rem; }

        /* ══ SHINY COIN ══ */
        .coin-wrap {
            width:44px; height:62px;
            display:flex; flex-direction:column; align-items:center;
            animation:coinFloat 1.15s ease-in-out infinite alternate;
            filter:drop-shadow(0 0 10px rgba(255,215,0,0.95));
        }
        @keyframes coinFloat {
            0%   { transform:translateY(0px);   filter:drop-shadow(0 0 10px rgba(255,215,0,0.9));  }
            100% { transform:translateY(-15px); filter:drop-shadow(0 0 22px rgba(255,200,0,1.0)); }
        }
        .coin-body {
            width:42px; height:42px; border-radius:50%;
            position:relative; overflow:hidden;
            background:conic-gradient(
                #fff176 0deg, #ffd700 30deg, #ffaa00 70deg,
                #ff8c00 100deg, #ffaa00 130deg, #ffd700 160deg,
                #fff176 180deg, #ffd700 210deg, #ffaa00 250deg,
                #ff8c00 280deg, #ffaa00 310deg, #ffd700 340deg, #fff176 360deg
            );
            border:2.5px solid rgba(255,255,255,0.55);
            animation:coinFlip 1.9s linear infinite;
        }
        /* 2D coin-flip illusion via scaleX */
        @keyframes coinFlip {
            0%,100% { transform:scaleX(1);    }
            24%     { transform:scaleX(1);    }
            25%     { transform:scaleX(0.08); }
            50%     { transform:scaleX(1);    }
            74%     { transform:scaleX(1);    }
            75%     { transform:scaleX(0.08); }
        }
        .coin-shimmer {
            position:absolute; top:-10%; left:-70%;
            width:55%; height:120%;
            background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,0.88) 50%,transparent 75%);
            border-radius:50%;
            animation:shimSweep 1.9s linear infinite;
        }
        @keyframes shimSweep {
            0%  { left:-70%; opacity:0; }
            8%  { opacity:1; }
            48% { left:120%; opacity:1; }
            49% { opacity:0; }
            100%{ left:120%; opacity:0; }
        }
        .coin-letter {
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            font-size:15px; font-weight:900; color:rgba(110,50,0,0.72);
            text-shadow:0 1px 0 rgba(255,255,255,0.45);
            animation:coinFlip 1.9s linear infinite;
        }
        /* sparkle dots */
        .coin-sparkles { position:absolute; inset:-8px; pointer-events:none; }
        .sp {
            position:absolute; width:5px; height:5px; border-radius:50%;
            background:#fff176;
            animation:sparkPop 1.5s ease-in-out infinite;
        }
        .sp1 { top:0%;   left:50%;   animation-delay:0s;     }
        .sp2 { top:50%;  right:0%;   animation-delay:0.375s; }
        .sp3 { bottom:0%;left:50%;   animation-delay:0.75s;  }
        .sp4 { top:50%;  left:0%;    animation-delay:1.125s; }
        @keyframes sparkPop {
            0%,100% { transform:scale(0);   opacity:0; }
            50%     { transform:scale(1.5); opacity:1; }
        }
        /* diagonal star sparkles */
        .sp5 { top:10%;  right:10%;  animation-delay:0.2s;  background:#ffffff; width:4px; height:4px; }
        .sp6 { bottom:10%;right:10%; animation-delay:0.6s;  background:#ffffff; width:4px; height:4px; }
        .coin-shadow {
            width:26px; height:6px; border-radius:50%;
            background:rgba(0,0,0,0.45); margin-top:5px;
            animation:shadowPulse 1.15s ease-in-out infinite alternate;
        }
        @keyframes shadowPulse {
            0%   { transform:scaleX(1);    opacity:0.5; }
            100% { transform:scaleX(0.45); opacity:0.2; }
        }

        /* user GPS dot */
        .user-dot {
            width:18px; height:18px; border-radius:50%;
            background:var(--cyan); border:3px solid white;
            animation:gpsPulse 1.6s ease-out infinite;
        }
        @keyframes gpsPulse {
            0%  { box-shadow:0 0 0 0   rgba(0,251,255,0.7); }
            70% { box-shadow:0 0 0 16px rgba(0,251,255,0);  }
            100%{ box-shadow:0 0 0 0   rgba(0,251,255,0);   }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">ADVENTURE WIRD GENERIERT...</p>
</div>

<div id="map"></div>

<div id="ui-overlay">
    <div class="stats-card">
        <div>
            <div id="status-text">SUCHE GPS...</div>
            <div style="display:flex;align-items:center;">
                <span id="level-display" style="font-size:1.15rem;font-weight:800;">LEVEL 1</span>
                <span class="level-badge" id="difficulty-tag">-- km</span>
            </div>
            <div class="coin-counter">🪙 <span id="collected-coins">0</span><small style="font-size:.95rem;color:#777;"> / <span id="total-coins">10</span></small></div>
        </div>
        <div style="text-align:right;line-height:2;">
            <div style="font-size:0.68rem;color:var(--cyan);letter-spacing:1px;">3D TERRAIN</div>
            <div id="dist-val" style="font-weight:700;color:var(--gold);font-size:1rem;">Quest bereit</div>
            <div id="nav-status" style="font-size:0.68rem;color:#555;letter-spacing:1px;">NAVIGATION AUS</div>
        </div>
    </div>
</div>

<div id="controls">
    <button id="quest-btn" class="btn">🗺 QUEST</button>
    <button id="nav-btn"   class="btn" disabled>▶ START</button>
</div>

<script>
const MT_KEY = '0h9bkxDZifPxKncVxFXv';

const state = {
    level:1, coinsToCollect:10, baseDist:20,
    collected:0, userPos:null,
    navigating:false, routeReady:false
};

let activeMarkers=[], userMarker=null;

/* ── MAP ───────────────────────────────── */
const map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/hybrid/style.json?key=${MT_KEY}`,
    center:[10.45,51.16], zoom:14, pitch:65, maxPitch:85
});

map.on('load',()=>{
    map.addSource('terrain',{
        type:'raster-dem',
        url:`https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MT_KEY}`,
        tileSize:256
    });
    map.setTerrain({source:'terrain',exaggeration:1.5});

    if("geolocation" in navigator){
        navigator.geolocation.watchPosition(onGPS, ()=>{
            document.getElementById('status-text').innerText='GPS FEHLER';
        },{enableHighAccuracy:true});
    }
});

function onGPS(pos){
    const {longitude:lon,latitude:lat} = pos.coords;
    state.userPos = [lon,lat];
    document.getElementById('status-text').innerText='GPS AKTIV ✓';

    if(!userMarker){
        const el=document.createElement('div'); el.className='user-dot';
        userMarker=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([lon,lat]).addTo(map);
    } else { userMarker.setLngLat([lon,lat]); }

    if(state.navigating) map.easeTo({center:[lon,lat],duration:700});
    checkCoinCollection(lon,lat);
}

/* ── FETCH ─────────────────────────────── */
async function timedFetch(url,ms=9000){
    const c=new AbortController(), t=setTimeout(()=>c.abort(),ms);
    try{ const r=await fetch(url,{signal:c.signal}); clearTimeout(t); return r; }
    catch(e){ clearTimeout(t); throw e; }
}

async function fetchBRouter(lonlats){
    const base=`https://brouter.de/brouter?lonlats=${lonlats}&profile=trekking&alternativeidx=0&format=geojson`;
    const msg=document.getElementById('loading-msg');
    const S=[
        {l:'VERBINDE MIT BROUTER...',   url:base,
         parse:r=>r.json()},
        {l:'NUTZE PROXY 1...',
         url:`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`,
         parse:async r=>{const j=await r.json(); return JSON.parse(j.contents);}},
        {l:'NUTZE PROXY 2...',
         url:`https://corsproxy.io/?url=${encodeURIComponent(base)}`,
         parse:r=>r.json()},
        {l:'NUTZE PROXY 3...',
         url:`https://cors.sh/${base}`,
         parse:r=>r.json()},
    ];
    for(const s of S){
        try{
            msg.innerText=s.l;
            const res=await timedFetch(s.url);
            if(!res.ok) continue;
            const d=await s.parse(res);
            if(d?.features) return d;
        }catch(e){console.warn(s.l,e.message);}
    }
    return null;
}

/* ── QUEST BUTTON ──────────────────────── */
async function generateRoute(){
    if(!state.userPos){alert('Warte auf GPS-Signal...'); return;}
    document.getElementById('loading').style.display='flex';
    document.getElementById('quest-btn').disabled=true;

    const [lon,lat]=state.userPos;
    const km   = state.baseDist * Math.pow(1.01,state.level-1);
    const rDeg = (km/(2*Math.PI))/111.32;
    const pts  = [`${lon},${lat}`];
    const a0   = Math.random()*Math.PI*2;

    for(let i=0;i<6;i++){
        const a=a0+i*(Math.PI/3);
        pts.push(`${(lon+Math.cos(a)*(rDeg/Math.cos(lat*Math.PI/180))).toFixed(6)},${(lat+Math.sin(a)*rDeg).toFixed(6)}`);
    }
    pts.push(`${lon},${lat}`);

    const geo=await fetchBRouter(pts.join('|'));
    document.getElementById('loading').style.display='none';
    document.getElementById('quest-btn').disabled=false;

    if(geo){
        renderRoute(geo); placeCoins(geo);
        const km2=(geo.features[0].properties['track-length']/1000).toFixed(1);
        document.getElementById('difficulty-tag').innerText=`${km2} km`;
        state.routeReady=true;
        document.getElementById('nav-btn').disabled=false;
    } else {
        alert('Routing nicht erreichbar. Bitte in ~1 Minute erneut versuchen.');
    }
}

/* ── NAV BUTTON ────────────────────────── */
function toggleNav(){
    state.navigating=!state.navigating;
    const btn=document.getElementById('nav-btn');
    const ns =document.getElementById('nav-status');
    if(state.navigating){
        btn.classList.add('active'); btn.textContent='⏸ PAUSE';
        ns.innerText='▶ NAVIGATION AN'; ns.style.color='var(--cyan)';
        if(state.userPos) map.flyTo({center:state.userPos,zoom:16,pitch:72,speed:1.3});
    } else {
        btn.classList.remove('active'); btn.textContent='▶ START';
        ns.innerText='NAVIGATION AUS'; ns.style.color='#555';
        zoomToRoute();
    }
}

/* ── ROUTE RENDER ──────────────────────── */
function renderRoute(geo){
    if(map.getSource('route')){
        map.getSource('route').setData(geo);
    } else {
        map.addSource('route',{type:'geojson',data:geo});
        map.addLayer({id:'route-glow',type:'line',source:'route',
            paint:{'line-color':'#00fbff','line-width':16,'line-opacity':0.15,'line-blur':10}});
        map.addLayer({id:'route',type:'line',source:'route',
            paint:{'line-color':'#00fbff','line-width':5,'line-opacity':0.9}});
        map.addLayer({id:'route-dash',type:'line',source:'route',
            paint:{'line-color':'#ffffff','line-width':2,'line-opacity':0.3,'line-dasharray':[4,9]}});
    }
    zoomToRoute(geo);
}
function zoomToRoute(geo){
    const src=geo||(map.getSource('route')?map.getSource('route')._data:null);
    if(!src) return;
    const coords=src.features[0].geometry.coordinates;
    const b=coords.reduce((b,c)=>b.extend(c),new maplibregl.LngLatBounds(coords[0],coords[0]));
    map.fitBounds(b,{padding:75,pitch:60});
}

/* ── COIN ELEMENT ──────────────────────── */
function makeCoin(){
    const w=document.createElement('div');
    w.className='coin-wrap';
    w.style.animationDelay=`${(Math.random()*1.15).toFixed(2)}s`;
    w.innerHTML=`
      <div style="position:relative;">
        <div class="coin-sparkles">
          <div class="sp sp1"></div><div class="sp sp2"></div>
          <div class="sp sp3"></div><div class="sp sp4"></div>
          <div class="sp sp5"></div><div class="sp sp6"></div>
        </div>
        <div class="coin-body">
          <div class="coin-shimmer"></div>
          <div class="coin-letter">C</div>
        </div>
      </div>
      <div class="coin-shadow"></div>`;
    return w;
}

/* ── PLACE COINS ───────────────────────── */
function placeCoins(geo){
    activeMarkers.forEach(m=>m.marker.remove());
    activeMarkers=[]; state.collected=0;
    state.coinsToCollect=10+Math.floor((state.level-1)/10);
    updateUI();
    const coords=geo.features[0].geometry.coordinates;
    const step=Math.floor(coords.length/(state.coinsToCollect+1));
    for(let i=1;i<=state.coinsToCollect;i++){
        const pos=coords[Math.min(i*step,coords.length-1)];
        const marker=new maplibregl.Marker({element:makeCoin(),anchor:'bottom'}).setLngLat(pos).addTo(map);
        activeMarkers.push({marker,collected:false,pos});
    }
}

/* ── CHECK COLLECTION ──────────────────── */
function checkCoinCollection(lon,lat){
    activeMarkers.forEach(m=>{
        if(m.collected||getDist(lon,lat,m.pos[0],m.pos[1])>=0.05) return;
        m.collected=true; m.marker.remove(); state.collected++;
        goldBurst(); updateUI();
        if(state.collected>=state.coinsToCollect){
            setTimeout(()=>{
                grandFinale();
                setTimeout(()=>{ alert(`🏆 LEVEL ${state.level} COMPLETE!`); state.level++; generateRoute(); },900);
            },300);
        }
    });
}

/* ── EFFECTS ───────────────────────────── */
function goldBurst(){
    const go=(o,a)=>confetti({
        particleCount:55, spread:52, startVelocity:26,
        origin:o, angle:a,
        colors:['#ffd700','#ffaa00','#fff176','#ffffff','#ff8c00'],
        shapes:['circle','square'], gravity:1.15, scalar:1.1
    });
    go({x:0.5,y:0.62},90);
    setTimeout(()=>go({x:0.48,y:0.58},85),110);
    setTimeout(()=>go({x:0.52,y:0.58},95),110);
}

function grandFinale(){
    const end=Date.now()+1600;
    (function frame(){
        confetti({particleCount:9,angle:58, spread:54,origin:{x:0}, colors:['#ffd700','#fff176','#ffaa00']});
        confetti({particleCount:9,angle:122,spread:54,origin:{x:1}, colors:['#ffd700','#fff176','#ffaa00']});
        if(Date.now()<end) requestAnimationFrame(frame);
    })();
}

/* ── HELPERS ───────────────────────────── */
function updateUI(){
    document.getElementById('collected-coins').innerText=state.collected;
    document.getElementById('total-coins').innerText=state.coinsToCollect;
    document.getElementById('level-display').innerText=`LEVEL ${state.level}`;
}
function getDist(lo1,la1,lo2,la2){
    const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

document.getElementById('quest-btn').addEventListener('click',generateRoute);
document.getElementById('nav-btn').addEventListener('click',toggleNav);
</script>
</body>
</html>
