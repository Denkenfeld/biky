<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CycleQuest 3D – Voxel Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold:#ffd700; --cyan:#00fbff; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#0a0a14; color:white; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
        #voxel-canvas { position:absolute; inset:0; z-index:0; display:block; }

        #ui-overlay { position:absolute; top:15px; left:15px; right:15px; z-index:10; pointer-events:none; }
        .stats-card {
            background:rgba(0,0,0,0.78); backdrop-filter:blur(14px);
            border:1px solid rgba(255,215,0,0.28); border-radius:18px;
            padding:14px 18px; pointer-events:auto;
            display:flex; justify-content:space-between; align-items:center;
            box-shadow:0 4px 24px rgba(0,0,0,.6);
        }
        .coin-ctr  { font-size:2rem; color:var(--gold); font-weight:900; line-height:1; }
        .lvl-badge { background:var(--gold); color:#000; padding:3px 10px; border-radius:8px; font-size:.78rem; font-weight:800; margin-left:8px; }
        #status-text { font-size:.68rem; color:#888; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; }

        #controls {
            position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
            display:flex; gap:12px; z-index:10; pointer-events:auto; white-space:nowrap;
        }
        .btn {
            border:none; padding:18px 34px; border-radius:50px;
            font-weight:900; font-size:1.2rem; cursor:pointer;
            text-transform:uppercase; letter-spacing:1px; transition:all .15s;
        }
        .btn:active { transform:scale(0.90); }
        .btn:disabled { background:#333!important; color:#666!important; cursor:not-allowed; box-shadow:none!important; }
        #quest-btn { background:var(--gold); color:#000; box-shadow:0 4px 22px rgba(255,215,0,.35); }
        #nav-btn   { background:transparent; color:var(--cyan); border:2px solid var(--cyan); }
        #nav-btn.active { background:var(--cyan); color:#000; }

        #difficulty-bar {
            position:absolute; bottom:116px; left:50%; transform:translateX(-50%);
            width:min(340px,90vw); z-index:10;
            background:rgba(0,0,0,0.78); backdrop-filter:blur(14px);
            border:1px solid rgba(255,215,0,.22); border-radius:18px;
            padding:12px 18px 10px;
        }
        #diff-labels { display:flex; justify-content:space-between; font-size:.68rem; font-weight:700; margin-bottom:9px; color:#777; }
        #diff-labels span.active { color:var(--gold); transform:scale(1.1); display:inline-block; }
        #diff-slider {
            -webkit-appearance:none; width:100%; height:5px; border-radius:3px; outline:none; cursor:pointer;
            background:linear-gradient(90deg,#3ddc84 0 25%,#ffd700 25% 50%,#ff8c00 50% 75%,#ff3b3b 75% 100%);
        }
        #diff-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
            background:#fff; border:2.5px solid var(--gold); box-shadow:0 0 8px rgba(255,215,0,.7);
        }
        #diff-slider::-moz-range-thumb {
            width:20px; height:20px; border-radius:50%; background:#fff; border:2.5px solid var(--gold); cursor:pointer;
        }
        #diff-km { text-align:center; font-size:.7rem; color:#666; margin-top:6px; letter-spacing:1px; }

        #loading {
            position:fixed; inset:0; background:rgba(0,0,0,.93); display:none;
            flex-direction:column; align-items:center; justify-content:center; z-index:999;
        }
        .spinner { width:52px; height:52px; border:4px solid #1a1a1a; border-top-color:var(--gold); border-radius:50%; animation:spin .9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading-msg { margin-top:16px; letter-spacing:2px; font-weight:700; color:#aaa; font-size:.82rem; text-align:center; max-width:85%; }
    </style>
</head>
<body>
<canvas id="voxel-canvas"></canvas>

<div id="loading"><div class="spinner"></div><p id="loading-msg">⛏ BAUE VOXEL-WELT...</p></div>

<div id="ui-overlay">
    <div class="stats-card">
        <div>
            <div id="status-text">GPS SUCHEN...</div>
            <div style="display:flex;align-items:center">
                <span id="lvl-disp" style="font-size:1.1rem;font-weight:800">LEVEL 1</span>
                <span class="lvl-badge" id="diff-tag">-- km</span>
            </div>
            <div class="coin-ctr">🪙 <span id="coins-coll">0</span><small style="font-size:.88rem;color:#666"> / <span id="coins-total">10</span></small></div>
        </div>
        <div style="text-align:right;line-height:2">
            <div style="font-size:.64rem;color:var(--cyan);letter-spacing:1px">⛏ VOXEL WORLD</div>
            <div id="dist-val" style="font-weight:700;color:var(--gold);font-size:.92rem">Quest bereit</div>
            <div id="nav-status" style="font-size:.64rem;color:#444;letter-spacing:1px">NAVIGATION AUS</div>
        </div>
    </div>
</div>

<div id="difficulty-bar">
    <div id="diff-labels">
        <span>🟢 Easy</span><span>🟡 Medium</span><span>🟠 Hard</span><span>🔴 Ultra</span>
    </div>
    <input type="range" id="diff-slider" min="0" max="3" step="1" value="0">
    <div id="diff-km">~15 km</div>
</div>

<div id="controls">
    <button id="quest-btn" class="btn">🗺 QUEST</button>
    <button id="nav-btn"   class="btn" disabled>▶ START</button>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   CONSTANTS
   ZOOM 11 → ~51 m/pixel at lat 48°
   GRID 96 → 96 × 51 m ≈ 4.9 km coverage
   One tile = 256 px; 96 px fits inside 1–4 tiles.
═══════════════════════════════════════════════════ */
const MT_KEY = '0h9bkxDZifPxKncVxFXv';
const ZOOM   = 11;    // wide area view
const GRID   = 96;    // voxel grid cells per side
const VGAP   = 0.86;  // visual block width/depth
const HMULT  = 0.048; // metres → voxel height  (500 m range → ~24 voxels)

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const S = {
    level:1, coinsToCollect:10, baseDist:15,
    collected:0, userPos:null,
    navigating:false, routeReady:false,
    terrainCenter:null, routeCoords:null, coinPositions:[],
};

/* ═══════════════════════════════════════════════════
   THREE.JS
═══════════════════════════════════════════════════ */
const canvas   = document.getElementById('voxel-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ab8d4);
// LINEAR fog — near=55, far=140 — close terrain is clear, far edge softens
scene.fog = new THREE.Fog(0x7ab8d4, 55, 145);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 400);
camera.position.set(14, 68, 62);
camera.lookAt(0, 6, 0);

// Lighting: bright ambient so ALL block faces are visible,
// moderate directional sun for depth/shadow contrast
scene.add(new THREE.AmbientLight(0xffffff, 0.72));
const sun = new THREE.DirectionalLight(0xfff0d0, 0.80);
sun.position.set(-30, 70, 20);
scene.add(sun);
// Soft sky light from above (fills upward-facing surfaces a bit more)
const sky = new THREE.DirectionalLight(0xd0eeff, 0.20);
sky.position.set(0, 50, 0);
scene.add(sky);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Shared geometries & materials
const TERRAIN_GEO = new THREE.BoxGeometry(VGAP, 1, VGAP);
const TERRAIN_MAT = new THREE.MeshLambertMaterial({ vertexColors:true });
const ROUTE_GEO   = new THREE.BoxGeometry(VGAP*1.1, 0.45, VGAP*1.1);
const ROUTE_MAT   = new THREE.MeshLambertMaterial({ color:0x00fbff, emissive:0x003344, emissiveIntensity:0.65 });
const COIN_GEO    = new THREE.BoxGeometry(0.6, 0.6, 0.6);
const COIN_MAT    = new THREE.MeshLambertMaterial({ color:0xffd700, emissive:0x553300, emissiveIntensity:0.7 });
const PLAYER_GEO  = new THREE.CylinderGeometry(0.35, 0.35, 1.1, 8);
const PLAYER_MAT  = new THREE.MeshLambertMaterial({ color:0xff2222, emissive:0x330000, emissiveIntensity:0.5 });

let terrainInst = null, routeInst = null;
let coin3D = [], playerMesh = null;
let elevGrid = null, colorGrid = null;
let minElev = 0, gridPixX = 0, gridPixY = 0;

/* ═══════════════════════════════════════════════════
   COORDINATE MATH  — pixel-accurate
   1 voxel = 1 pixel sampled from the tile raster
═══════════════════════════════════════════════════ */
const lonToTX   = (lon,z) => (lon+180)/360*(1<<z);
const latToTY   = (lat,z) => { const s=Math.sin(lat*Math.PI/180); return (1-Math.log((1+s)/(1-s))/(2*Math.PI))/2*(1<<z); };
const rgbToElev = (r,g,b) => -10000+(r*65536+g*256+b)*0.1;

function setGrid(lat, lon) {
    gridPixX = lonToTX(lon, ZOOM) * 256;   // global pixel coordinates
    gridPixY = latToTY(lat, ZOOM) * 256;
}

function geoToGrid(lat, lon) {
    return {
        i: Math.round(lonToTX(lon,ZOOM)*256 - gridPixX + GRID/2),
        j: Math.round(latToTY(lat,ZOOM)*256 - gridPixY + GRID/2),
    };
}

function gridToWorld(i, j) {
    const ii=Math.max(0,Math.min(GRID-1,i)), jj=Math.max(0,Math.min(GRID-1,j));
    const elev = elevGrid ? elevGrid[jj*GRID+ii] : 300;
    const h = Math.max(1, Math.round((elev-minElev)*HMULT+1));
    return { x:i-GRID/2, y:h, z:j-GRID/2 };
}

function getDist(lo1,la1,lo2,la2) {
    const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ═══════════════════════════════════════════════════
   SATELLITE RGB → MINECRAFT BLOCK COLOUR
   Uses real satellite pixel values from MapTiler.
   Quantised to a vivid palette so terrain features
   (forest, road, field, water) are clearly distinct.
═══════════════════════════════════════════════════ */
function toBlock(r, g, b, elev) {
    // Water: low absolute elevation — override colour
    if (elev < 3)  return 0x1565C0; // deep water
    if (elev < 8)  return 0x1E88E5; // shallow water

    // Snow / high mountain peaks
    if ((elev - minElev) > 650) return 0xECEFF1;

    const bri = (r+g+b)/765;
    const gDom = g > r+10 && g > b+6;
    const bDom = b > r+22 && b > g+12;
    const grey = Math.abs(r-g)<22 && Math.abs(g-b)<22 && Math.abs(r-b)<22;

    if (bDom)                              return 0x1976D2; // water / shadow
    if (grey && bri>0.62)                  return 0xBDBDBD; // concrete / roof
    if (grey && bri>0.28 && bri<0.62)     return 0x757575; // asphalt / road
    if (gDom && g<75)                      return 0x1B5E20; // dense/dark forest
    if (gDom && g<115)                     return 0x2E7D32; // conifer forest
    if (gDom && g<155)                     return 0x388E3C; // mixed forest
    if (gDom)                              return 0x7CB342; // meadow / grass
    if (r>140 && g>115 && b<r-30)         return 0xF9A825; // cropfield / soil
    if (bri>0.78)                          return 0xD7CCC8; // bare rock / sand
    if (bri<0.15)                          return 0x4E342E; // dark earth / peat

    // Quantise the raw satellite colour to a coarser palette (looks Minecraft-ish)
    return ((Math.round(r/85)*85)<<16)|((Math.round(g/85)*85)<<8)|(Math.round(b/85)*85);
}

/* ═══════════════════════════════════════════════════
   TILE LOADING
═══════════════════════════════════════════════════ */
function fetchTile(url) {
    return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            try {
                const c = document.createElement('canvas');
                c.width = c.height = 256;
                c.getContext('2d').drawImage(img, 0, 0);
                resolve(c.getContext('2d').getImageData(0,0,256,256).data);
            } catch(e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = url;
    });
}

const elevUrl = (tx,ty) => `https://api.maptiler.com/tiles/terrain-rgb-v2/${ZOOM}/${tx}/${ty}.png?key=${MT_KEY}`;
const satUrl  = (tx,ty) => `https://api.maptiler.com/tiles/satellite-v2/${ZOOM}/${tx}/${ty}.jpg?key=${MT_KEY}`;

/* ═══════════════════════════════════════════════════
   LOAD TERRAIN
═══════════════════════════════════════════════════ */
async function loadTerrain(lat, lon) {
    document.getElementById('loading-msg').innerText = '⛏ ECHTE LANDSCHAFT WIRD GELADEN...';
    document.getElementById('loading').style.display = 'flex';

    S.terrainCenter = [lat, lon];
    setGrid(lat, lon);

    const half = GRID/2;

    // Collect unique tile coords
    const needed = new Map();
    for (let j=0;j<GRID;j++) for (let i=0;i<GRID;i++) {
        const px=gridPixX+(i-half), py=gridPixY+(j-half);
        const tx=Math.floor(px/256), ty=Math.floor(py/256);
        needed.set(`${tx}_${ty}`,{tx,ty});
    }

    // Load elevation + satellite in parallel
    document.getElementById('loading-msg').innerText = `⛏ LADE ${needed.size} KACHELN (ELEVATION + SATELLIT)...`;
    const elevTiles=new Map(), satTiles=new Map();
    await Promise.all([...needed.entries()].flatMap(([key,{tx,ty}])=>[
        fetchTile(elevUrl(tx,ty)).then(d=>elevTiles.set(key,d)),
        fetchTile(satUrl (tx,ty)).then(d=>satTiles .set(key,d)),
    ]));

    // Sample grids
    elevGrid  = new Float32Array(GRID*GRID);
    colorGrid = new Uint32Array(GRID*GRID);

    for (let j=0;j<GRID;j++) for (let i=0;i<GRID;i++) {
        const px=gridPixX+(i-half), py=gridPixY+(j-half);
        const tx=Math.floor(px/256), ty=Math.floor(py/256);
        const pix_x=Math.floor(px)-tx*256, pix_y=Math.floor(py)-ty*256;
        const pidx=(pix_y*256+pix_x)*4;
        const key=`${tx}_${ty}`;

        // Elevation
        const ed=elevTiles.get(key);
        let elev = ed
            ? rgbToElev(ed[pidx],ed[pidx+1],ed[pidx+2])
            // Procedural fallback: rolling hills so at least SOMETHING is visible
            : 350 + Math.sin(i*0.22)*90 + Math.cos(j*0.18)*70
                 + Math.sin((i+j)*0.38)*35 + Math.sin(i*0.7-j*0.5)*20;
        elevGrid[j*GRID+i] = elev;

        // Colour
        const sd=satTiles.get(key);
        colorGrid[j*GRID+i] = sd
            ? toBlock(sd[pidx],sd[pidx+1],sd[pidx+2],elev)
            // Fallback elevation-based biome (always looks decent)
            : elevFallbackColor(elev);
    }

    // Cache min elevation
    minElev = Infinity;
    for (let k=0;k<GRID*GRID;k++) if (elevGrid[k]<minElev) minElev=elevGrid[k];

    buildTerrain();
    document.getElementById('loading').style.display = 'none';
}

// Elevation-based colour if satellite tiles don't load
function elevFallbackColor(elev) {
    if (elev<3)   return 0x1565C0;
    const h=elev-minElev; // wait, minElev not set yet — use absolute
    if (elev<50)  return 0x1976D2;  // water/lowland
    if (elev<200) return 0x7CB342;  // flat/valley
    if (elev<400) return 0x388E3C;  // forest foothills
    if (elev<600) return 0x6D4C41;  // rock / cliff
    if (elev<900) return 0x9E9E9E;  // stone
    return 0xECEFF1;                 // snow
}

/* ═══════════════════════════════════════════════════
   BUILD VOXEL TERRAIN
═══════════════════════════════════════════════════ */
function buildTerrain() {
    if (terrainInst) scene.remove(terrainInst);

    terrainInst = new THREE.InstancedMesh(TERRAIN_GEO, TERRAIN_MAT, GRID*GRID);
    const dummy=new THREE.Object3D(), color=new THREE.Color();

    for (let j=0;j<GRID;j++) for (let i=0;i<GRID;i++) {
        const k=j*GRID+i;
        const elev=elevGrid[k];
        const h=Math.max(1, Math.round((elev-minElev)*HMULT+1));
        dummy.position.set(i-GRID/2, h/2, j-GRID/2);
        dummy.scale.set(1, h, 1);
        dummy.updateMatrix();
        terrainInst.setMatrixAt(k, dummy.matrix);
        terrainInst.setColorAt(k, color.setHex(colorGrid[k]));
    }
    terrainInst.instanceMatrix.needsUpdate = true;
    terrainInst.instanceColor.needsUpdate  = true;
    scene.add(terrainInst);

    buildRoute();
    buildCoins3D();
    updatePlayer3D();
}

/* ═══════════════════════════════════════════════════
   ROUTE
═══════════════════════════════════════════════════ */
function buildRoute() {
    if (routeInst) scene.remove(routeInst);
    if (!S.routeCoords) return;

    const step=Math.max(1,Math.floor(S.routeCoords.length/600));
    const cells=new Set();
    for (let k=0;k<S.routeCoords.length;k+=step) {
        const [lon,lat]=S.routeCoords[k];
        const g=geoToGrid(lat,lon);
        if (g.i>=0&&g.i<GRID&&g.j>=0&&g.j<GRID) cells.add(`${g.i},${g.j}`);
    }
    const arr=[...cells].map(s=>s.split(',').map(Number));
    if (!arr.length) return;

    routeInst=new THREE.InstancedMesh(ROUTE_GEO,ROUTE_MAT,arr.length);
    const dummy=new THREE.Object3D();
    arr.forEach(([i,j],idx)=>{
        const wp=gridToWorld(i,j);
        dummy.position.set(wp.x,wp.y+0.24,wp.z);
        dummy.scale.set(1,1,1); dummy.updateMatrix();
        routeInst.setMatrixAt(idx,dummy.matrix);
    });
    routeInst.instanceMatrix.needsUpdate=true;
    scene.add(routeInst);
}

/* ═══════════════════════════════════════════════════
   COINS
═══════════════════════════════════════════════════ */
function buildCoins3D() {
    coin3D.forEach(m=>scene.remove(m));
    coin3D=[];
    S.coinPositions.forEach(c=>{
        if (c.collected) return;
        const g=geoToGrid(c.pos[1],c.pos[0]);
        if (g.i<0||g.i>=GRID||g.j<0||g.j>=GRID) return;
        const wp=gridToWorld(g.i,g.j);
        const mesh=new THREE.Mesh(COIN_GEO,COIN_MAT);
        mesh.position.set(wp.x,wp.y+2,wp.z);
        mesh.userData.baseY=wp.y+2;
        scene.add(mesh); coin3D.push(mesh); c.mesh=mesh;
    });
}

/* ═══════════════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════════════ */
function updatePlayer3D() {
    if (!S.userPos) return;
    const [lon,lat]=S.userPos;
    const g=geoToGrid(lat,lon), wp=gridToWorld(g.i,g.j);
    if (!playerMesh) { playerMesh=new THREE.Mesh(PLAYER_GEO,PLAYER_MAT); scene.add(playerMesh); }
    playerMesh.position.set(wp.x,wp.y+0.55,wp.z);
}

/* ═══════════════════════════════════════════════════
   ANIMATION
═══════════════════════════════════════════════════ */
const _ct=new THREE.Vector3(0,6,0), _cg=new THREE.Vector3(14,68,62);

function animate(ms) {
    requestAnimationFrame(animate);
    const t=ms*0.001;

    coin3D.forEach((m,k)=>{
        m.rotation.y=t*1.9+k*1.1;
        m.rotation.x=Math.sin(t*0.9+k)*0.25;
        m.position.y=m.userData.baseY+Math.sin(t*1.8+k*0.85)*0.32;
    });
    if (routeInst) routeInst.material.emissiveIntensity=0.4+Math.sin(t*1.3)*0.22;

    if (S.navigating&&playerMesh) {
        _ct.lerp(playerMesh.position,0.05);
        _cg.set(_ct.x+4,_ct.y+22,_ct.z+28);
    } else {
        const r=62;
        _cg.set(Math.sin(t*0.022)*r,66,Math.cos(t*0.022)*r);
        _ct.set(0,7,0);
    }
    camera.position.lerp(_cg,0.07);
    camera.lookAt(_ct);
    renderer.render(scene,camera);
}
animate(0);

/* ═══════════════════════════════════════════════════
   GPS
═══════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', ()=>{
    loadTerrain(48.2751, 8.8552); // Balingen default
    if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(onGPS,
            ()=>{ document.getElementById('status-text').innerText='GPS FEHLER'; },
            { enableHighAccuracy:true });
    } else {
        document.getElementById('status-text').innerText='KEIN GPS';
    }
});

function onGPS(pos) {
    const {longitude:lon,latitude:lat}=pos.coords;
    const first=!S.userPos;
    S.userPos=[lon,lat];
    document.getElementById('status-text').innerText='GPS AKTIV ✓';
    if (first&&!S.routeReady) loadTerrain(lat,lon);
    else if (S.terrainCenter&&!S.routeReady&&getDist(lat,lon,...S.terrainCenter)>0.4) loadTerrain(lat,lon);
    updatePlayer3D();
    checkCoinCollection(lon,lat);
}

/* ═══════════════════════════════════════════════════
   BROUTER
═══════════════════════════════════════════════════ */
async function timedFetch(url,ms=9000) {
    const c=new AbortController(), t=setTimeout(()=>c.abort(),ms);
    try { const r=await fetch(url,{signal:c.signal}); clearTimeout(t); return r; }
    catch(e) { clearTimeout(t); throw e; }
}

async function fetchBRouter(lonlats) {
    const base=`https://brouter.de/brouter?lonlats=${lonlats}&profile=trekking&alternativeidx=0&format=geojson`;
    const msg=document.getElementById('loading-msg');
    for (const s of [
        { l:'ROUTE BERECHNEN...', go:()=>timedFetch(base,10000), parse:r=>r.json() },
        { l:'PROXY 1...', go:()=>timedFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`,11000),
          parse:async r=>{const j=await r.json();return JSON.parse(j.contents);} },
        { l:'PROXY 2...', go:()=>timedFetch(`https://corsproxy.io/?url=${encodeURIComponent(base)}`,9000), parse:r=>r.json() },
    ]) {
        try { msg.innerText=s.l; const res=await s.go(); if(!res.ok) continue; const d=await s.parse(res); if(d?.features) return d; }
        catch(e) { console.warn(s.l,e.message); }
    }
    return null;
}

/* ═══════════════════════════════════════════════════
   QUEST
═══════════════════════════════════════════════════ */
async function generateRoute() {
    if (!S.userPos) { alert('Warte auf GPS-Signal...'); return; }
    document.getElementById('loading').style.display='flex';
    document.getElementById('loading-msg').innerText='ROUTE BERECHNEN...';
    document.getElementById('quest-btn').disabled=true;

    const [lon,lat]=S.userPos;
    const km=S.baseDist*Math.pow(1.01,S.level-1);
    const rDeg=(km/(2*Math.PI))/111.32;
    const pts=[`${lon},${lat}`];
    const a0=Math.random()*Math.PI*2;
    for (let i=0;i<6;i++) {
        const a=a0+i*(Math.PI/3);
        pts.push(`${(lon+Math.cos(a)*(rDeg/Math.cos(lat*Math.PI/180))).toFixed(6)},${(lat+Math.sin(a)*rDeg).toFixed(6)}`);
    }
    pts.push(`${lon},${lat}`);

    const geo=await fetchBRouter(pts.join('|'));
    if (geo) {
        S.routeCoords=geo.features[0].geometry.coordinates;
        document.getElementById('diff-tag').innerText=`${(geo.features[0].properties['track-length']/1000).toFixed(1)} km`;
        S.collected=0; S.coinsToCollect=10+Math.floor((S.level-1)/10); updateUI();
        const cStep=Math.floor(S.routeCoords.length/(S.coinsToCollect+1));
        S.coinPositions=Array.from({length:S.coinsToCollect},(_,i)=>({
            collected:false, pos:S.routeCoords[Math.min((i+1)*cStep,S.routeCoords.length-1)], mesh:null
        }));
        await loadTerrain(lat,lon);
        S.routeReady=true;
        document.getElementById('nav-btn').disabled=false;
    } else {
        alert('Routing nicht erreichbar.\nBitte WLAN prüfen und erneut versuchen.');
        document.getElementById('loading').style.display='none';
    }
    document.getElementById('quest-btn').disabled=false;
}

/* ═══════════════════════════════════════════════════
   NAV / COINS / EFFECTS / UI
═══════════════════════════════════════════════════ */
function toggleNav() {
    S.navigating=!S.navigating;
    const btn=document.getElementById('nav-btn'), ns=document.getElementById('nav-status');
    if (S.navigating) { btn.classList.add('active'); btn.textContent='⏸ PAUSE'; ns.innerText='▶ NAVIGATION AN'; ns.style.color='var(--cyan)'; }
    else              { btn.classList.remove('active'); btn.textContent='▶ START'; ns.innerText='NAVIGATION AUS'; ns.style.color='#444'; }
}

function checkCoinCollection(lon,lat) {
    S.coinPositions.forEach(c=>{
        if (c.collected||getDist(lon,lat,c.pos[0],c.pos[1])>=0.05) return;
        c.collected=true;
        if (c.mesh) { scene.remove(c.mesh); coin3D=coin3D.filter(m=>m!==c.mesh); }
        S.collected++; goldBurst(); updateUI();
        if (S.collected>=S.coinsToCollect) {
            setTimeout(()=>{ grandFinale(); setTimeout(()=>{ alert(`🏆 LEVEL ${S.level} COMPLETE!`); S.level++; generateRoute(); },900); },300);
        }
    });
}

function goldBurst() {
    const go=(ox,oa)=>confetti({particleCount:55,spread:52,startVelocity:26,angle:oa,origin:{x:ox,y:0.62},colors:['#ffd700','#ffaa00','#fff176','#ffffff','#ff8c00'],gravity:1.2});
    go(0.5,90); setTimeout(()=>{go(0.46,82);go(0.54,98);},110);
}
function grandFinale() {
    const end=Date.now()+1700;
    (function f(){
        confetti({particleCount:9,angle:58,spread:55,origin:{x:0},colors:['#ffd700','#fff176','#ffaa00']});
        confetti({particleCount:9,angle:122,spread:55,origin:{x:1},colors:['#ffd700','#fff176','#ffaa00']});
        if(Date.now()<end) requestAnimationFrame(f);
    })();
}

function updateUI() {
    document.getElementById('coins-coll').innerText=S.collected;
    document.getElementById('coins-total').innerText=S.coinsToCollect;
    document.getElementById('lvl-disp').innerText=`LEVEL ${S.level}`;
}

const DIFFS=[{km:15},{km:30},{km:45},{km:60}];
function applyDiff(idx) {
    S.baseDist=DIFFS[idx].km;
    document.getElementById('diff-km').innerText=`~${DIFFS[idx].km} km`;
    document.querySelectorAll('#diff-labels span').forEach((el,i)=>el.classList.toggle('active',i===idx));
}
document.getElementById('diff-slider').addEventListener('input',e=>applyDiff(+e.target.value));
applyDiff(0);
document.getElementById('quest-btn').addEventListener('click',generateRoute);
document.getElementById('nav-btn').addEventListener('click',toggleNav);
</script>
